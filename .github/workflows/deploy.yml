name: CampusPilot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # 1. 后端测试
  # ============================================================
  backend-tests:
    name: 后端单元测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov mypy

      - name: 运行后端测试
        run: |
          source venv/bin/activate
          pytest tests/ -v --cov=app --cov-report=xml --junitxml=test-results.xml

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # 2. 前端构建测试
  # ============================================================
  frontend-build:
    name: 前端构建测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: 构建前端
        working-directory: ./frontend
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ============================================================
  # 3. Docker 构建测试
  # ============================================================
  docker-build:
    name: Docker 镜像构建测试
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: campuspilot-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: campuspilot-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 4. 部署到服务器（仅 main 分支）
  # ============================================================
  deploy:
    name: 部署到生产服务器
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: 部署到服务器
        env:
          SSH_KEY: ~/.ssh/deploy_key
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || 22 }}
        run: |
          chmod +x deploy.sh
          bash deploy.sh --deploy

      - name: 健康检查
        run: |
          sleep 30
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.SERVER_IP }}:8000/health)
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::健康检查失败 (HTTP $HTTP_STATUS)"
            exit 1
          fi
          
          echo "✓ 部署成功，服务运行正常"

      - name: 发送通知（可选）
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 CampusPilot 部署成功！"
            curl -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"✅ CampusPilot 部署成功\n版本: '"${{ github.sha }}"'\n时间: '"$(date)"'"}'
          else
            echo "❌ CampusPilot 部署失败"
            curl -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"❌ CampusPilot 部署失败\n请检查日志"}'
          fi

  # ============================================================
  # 5. 回滚（手动触发）
  # ============================================================
  rollback:
    name: 回滚到上一版本
    runs-on: ubuntu-latest
    if: github.event.ref == 'refs/heads/main' && github.event.action == 'rollback'
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 执行回滚
        env:
          SSH_KEY: ~/.ssh/deploy_key
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || 22 }}
        run: |
          chmod +x deploy.sh
          bash deploy.sh --rollback

      - name: 验证回滚
        run: |
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.SERVER_IP }}:8000/health)
          
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "✓ 回滚成功"
          else
            echo "::error::回滚后健康检查失败"
            exit 1
          fi
